<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Allegro — pipeline editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12.3.5/dist/style.css" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.4 -apple-system, system-ui, sans-serif; height: 100vh; }
    #root { height: 100vh; display: flex; flex-direction: column; }
    .bar { display: flex; align-items: center; gap: 14px; padding: 10px 16px; border-bottom: 1px solid #0002; flex: 0 0 auto; }
    .bar b { font-size: 15px; }
    .bar .path { font-family: ui-monospace, monospace; opacity: .6; font-size: 12px; }
    .bar .spacer { flex: 1; }
    .bar button { padding: 6px 14px; border-radius: 6px; border: 1px solid #0003; background: #2563eb; color: #fff; cursor: pointer; font-weight: 600; }
    .bar button:disabled { opacity: .45; cursor: default; }
    .bar .status { font-size: 12px; opacity: .7; min-width: 110px; }
    .main { flex: 1; min-height: 0; display: flex; }
    .flow { flex: 1; min-width: 0; }
    .inspector { width: 260px; flex: 0 0 260px; border-left: 1px solid #0002; padding: 14px; overflow-y: auto; }
    .inspector h3 { margin: 0 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; opacity: .55; }
    .inspector .hint { font-size: 12px; opacity: .5; margin: 0 0 14px; }
    .field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
    .field span { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; opacity: .55; }
    .field input, .field select { padding: 6px; border-radius: 6px; border: 1px solid #0003; font: inherit; background: #fff; color: inherit; }
    .field.row { flex-direction: row; align-items: center; gap: 8px; }
    .field.row span { flex: 1; }
    .node { border-radius: 10px; padding: 9px 12px; min-width: 130px; border: 1px solid #0003; background: #fff; box-shadow: 0 1px 3px #0001; }
    .node.sel { outline: 2px solid #2563eb; outline-offset: 2px; }
    .node .t { font-weight: 700; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; opacity: .55; }
    .node .sub { margin-top: 3px; font-family: ui-monospace, monospace; font-size: 12px; }
    .node.io { background: #f4f4f5; border-style: dashed; text-align: center; font-size: 18px; }
    .node.core { background: #fef3c7; border-color: #f59e0b; }
    .node.oss  { background: #ecfdf5; border-color: #10b981; }
    .node.buy  { background: #eff6ff; border-color: #3b82f6; }
    @media (prefers-color-scheme: dark) { body{background:#18181b;color:#e4e4e7} .node{background:#27272a;border-color:#3f3f46} .field input,.field select{background:#18181b;color:#e4e4e7} .node.io{background:#1f1f23} .node.core{background:#3a2f14} .node.oss{background:#14312a} .node.buy{background:#16233f} }
  </style>
  <script type="importmap">
  {"imports":{
    "react":"https://esm.sh/react@18.3.1",
    "react-dom/client":"https://esm.sh/react-dom@18.3.1/client",
    "@xyflow/react":"https://esm.sh/@xyflow/react@12.3.5?deps=react@18.3.1,react-dom@18.3.1",
    "htm":"https://esm.sh/htm@3.1.1"
  }}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useEffect, useState, useCallback } from 'react'
    import { createRoot } from 'react-dom/client'
    import { ReactFlow, Background, Controls, Handle, Position, useNodesState, useEdgesState } from '@xyflow/react'
    import htm from 'htm'
    const html = htm.bind(React.createElement)

    const META = { vad:{label:'VAD',tone:'oss'}, stt:{label:'STT',tone:'buy'}, coach:{label:'Coach',tone:'core'}, llm:{label:'LLM',tone:'buy'}, tts:{label:'TTS',tone:'buy'} }
    const LEGS = ['vad', 'stt', 'coach', 'llm', 'tts']
    const DEFAULT_POS = { mic:{x:0,y:150}, vad:{x:150,y:150}, stt:{x:330,y:150}, coach:{x:530,y:150}, tts:{x:730,y:150}, speaker:{x:920,y:150}, llm:{x:530,y:310} }
    const EDGES = [['mic','vad'],['vad','stt'],['stt','coach'],['coach','tts'],['tts','speaker'],['coach','llm']]
      .map(([s,t],i)=>({ id:'e'+i, source:s, target:t, animated:!(s==='coach'&&t==='llm') }))

    const getIn = (o, path) => path.reduce((a, k) => (a == null ? a : a[k]), o)
    function setIn(obj, path, value) {
      const next = structuredClone(obj); let o = next
      for (let i = 0; i < path.length - 1; i++) { if (o[path[i]] == null) o[path[i]] = {}; o = o[path[i]] }
      if (value === undefined) delete o[path[path.length - 1]]; else o[path[path.length - 1]] = value
      return next
    }
    function summary(id, cfg) {
      const n = cfg.nodes[id]; if (!n) return null
      if (id === 'vad') return { sub: `silero · conf ${n.params?.confidence ?? '—'}` }
      if (id === 'coach') return { sub: 'builtin · fixed' }
      if (id === 'tts') return { sub: n.provider + (n.params?.voice ? ' · ' + n.params.voice : '') }
      return { sub: n.provider + (n.model ? ' · ' + n.model : '') }
    }

    function LegNode({ data }) {
      return html`<div className=${'node ' + data.tone + (data.selected ? ' sel' : '')}>
        <${Handle} type="target" position=${Position.Left} />
        <div className="t">${data.label}</div><div className="sub">${data.sub}</div>
        <${Handle} type="source" position=${Position.Right} />
      </div>`
    }
    function IoNode({ data }) {
      return html`<div className="node io"><${Handle} type="target" position=${Position.Left} />${data.label}<${Handle} type="source" position=${Position.Right} /></div>`
    }
    const nodeTypes = { leg: LegNode, io: IoNode }

    function Inspector({ selected, cfg, providers, update }) {
      const Field = ({ label, children }) => html`<label className="field"><span>${label}</span>${children}</label>`
      const txt = (label, path) => html`<${Field} label=${label}><input type="text" value=${getIn(cfg, path) ?? ''} onChange=${e => update(path, e.target.value || undefined)} /><//>`
      const num = (label, path) => html`<${Field} label=${label}><input type="number" step="any" value=${getIn(cfg, path) ?? ''} onChange=${e => update(path, e.target.value === '' ? undefined : parseFloat(e.target.value))} /><//>`
      const sel = (label, path, opts) => html`<${Field} label=${label}><select value=${getIn(cfg, path)} onChange=${e => update(path, e.target.value)}>${opts.map(o => html`<option key=${o.name || o} value=${o.name || o}>${o.name ? `${o.name} · ${o.kind}` : o}</option>`)}</select><//>`
      const chk = (label, path) => html`<label className="field row"><span>${label}</span><input type="checkbox" checked=${!!getIn(cfg, path)} onChange=${e => update(path, e.target.checked)} /></label>`

      if (!selected) return html`<div className="inspector">
        <h3>Pipeline</h3><p className="hint">Click a node to edit it. These apply to the whole run.</p>
        ${sel('transport', ['transport', 'type'], ['webrtc'])}
        ${chk('allow interruptions', ['runtime', 'allow_interruptions'])}
        ${num('timer scale (dev)', ['runtime', 'timer_scale'])}
      </div>`

      const body = {
        vad: () => html`<div>${num('confidence', ['nodes','vad','params','confidence'])}${num('start_secs', ['nodes','vad','params','start_secs'])}${num('stop_secs', ['nodes','vad','params','stop_secs'])}${num('min_volume', ['nodes','vad','params','min_volume'])}</div>`,
        stt: () => html`<div>${sel('provider', ['nodes','stt','provider'], providers.stt)}${txt('model', ['nodes','stt','model'])}</div>`,
        llm: () => html`<div>${sel('provider', ['nodes','llm','provider'], providers.llm)}${txt('model', ['nodes','llm','model'])}</div>`,
        tts: () => html`<div>${sel('provider', ['nodes','tts','provider'], providers.tts)}${txt('model', ['nodes','tts','model'])}${txt('voice', ['nodes','tts','params','voice'])}</div>`,
        coach: () => html`<p className="hint">The in-house state machine + intents + safety guardrail. Not swappable.</p>`,
      }[selected]
      return html`<div className="inspector"><h3>${META[selected].label}</h3>${body()}</div>`
    }

    function App() {
      const [cfg, setCfg] = useState(null)
      const [providers, setProviders] = useState(null)
      const [path, setPath] = useState('')
      const [nodes, setNodes, onNodesChange] = useNodesState([])
      const [edges] = useEdgesState(EDGES)
      const [selected, setSelected] = useState(null)
      const [dirty, setDirty] = useState(false)
      const [status, setStatus] = useState('')

      useEffect(() => {
        Promise.all([fetch('/api/pipeline').then(r => r.json()), fetch('/api/providers').then(r => r.json())]).then(([pipe, provs]) => {
          const c = pipe.config; setCfg(c); setProviders(provs); setPath(pipe.path.split('/').pop())
          const layout = c.layout || {}
          const pos = id => layout[id] || DEFAULT_POS[id]
          setNodes([
            { id:'mic', type:'io', position:pos('mic'), data:{label:'🎙️'} },
            ...LEGS.map(id => ({ id, type:'leg', position:pos(id), data:{ label:META[id].label, tone:META[id].tone, ...summary(id, c) } })),
            { id:'speaker', type:'io', position:pos('speaker'), data:{label:'🔊'} },
          ])
        })
      }, [])

      // Reflect config edits into node summaries + selection ring, preserving positions.
      useEffect(() => {
        if (!cfg) return
        setNodes(nds => nds.map(n => LEGS.includes(n.id)
          ? { ...n, data: { ...n.data, ...summary(n.id, cfg), selected: n.id === selected } } : n))
      }, [cfg, selected])

      const update = useCallback((p, v) => { setCfg(c => setIn(c, p, v)); setDirty(true); setStatus('unsaved changes') }, [])

      const save = useCallback(() => {
        const layout = {}; nodes.forEach(n => { layout[n.id] = { x: Math.round(n.position.x), y: Math.round(n.position.y) } })
        fetch('/api/pipeline', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ...cfg, layout }) })
          .then(r => r.json()).then(r => { setStatus(r.ok ? 'saved ✓' : 'save failed'); setDirty(false) })
      }, [cfg, nodes])

      if (!cfg || !providers) return html`<div style=${{ padding: 24 }}>Loading pipeline…</div>`
      return html`<div>
        <div className="bar">
          <b>Allegro pipeline</b><span className="path">${path}</span><span className="spacer"></span>
          <span className="status">${status}</span>
          <button disabled=${!dirty} onClick=${save}>Save</button>
        </div>
        <div className="main">
          <div className="flow">
            <${ReactFlow} nodes=${nodes} edges=${edges} nodeTypes=${nodeTypes} onNodesChange=${onNodesChange}
              onNodeClick=${(_, n) => setSelected(LEGS.includes(n.id) ? n.id : null)}
              onPaneClick=${() => setSelected(null)} fitView proOptions=${{ hideAttribution: true }}>
              <${Background} /><${Controls} />
            <//>
          </div>
          <${Inspector} selected=${selected} cfg=${cfg} providers=${providers} update=${update} />
        </div>
      </div>`
    }
    createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
